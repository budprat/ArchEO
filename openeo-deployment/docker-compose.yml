version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openeo-api
    ports:
      - "8000:8000"
    environment:
      - API_DNS=localhost
      - API_TLS=False
      - API_TITLE=OpenEO API
      - API_DESCRIPTION=OpenEO FastAPI Implementation
      - OPENEO_VERSION=1.1.0
      - OPENEO_PREFIX=/openeo/1.1.0
      - OIDC_URL=https://aai.egi.eu/auth/realms/egi
      - OIDC_ORGANISATION=egi
      - STAC_API_URL=https://earth-search.aws.element84.com/v1/
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRESQL_HOST=db
      - POSTGRESQL_PORT=5432
      - POSTGRES_DB=openeo
      - ALEMBIC_DIR=/app/psql
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./openeo_app:/app
    command: >
      sh -c "cd /app &&
             python -c \"
from alembic import command
from alembic.config import Config
import os
os.chdir('/app/psql')
alembic_cfg = Config('alembic.ini')
try:
    command.revision(alembic_cfg, 'init', autogenerate=True)
except:
    pass
command.upgrade(alembic_cfg, 'head')
\" &&
             uvicorn app:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:15-alpine
    container_name: openeo-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=openeo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
